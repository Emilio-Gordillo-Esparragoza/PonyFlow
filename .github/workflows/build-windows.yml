name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build Python engine
        working-directory: ./engine
        run: |
          pip install -r requirements.txt
          python -m PyInstaller ponyflow.spec --noconfirm
          if (!(Test-Path "dist\ponyflow-engine.exe")) { throw "ponyflow-engine.exe missing" }

      - name: Stage engine resource for Tauri
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri\resources" | Out-Null
          Copy-Item "engine\dist\ponyflow-engine.exe" "src-tauri\resources\ponyflow-engine.exe" -Force

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri App
        id: tauri_build
        shell: pwsh
        run: |
          npm run tauri -- build --bundles nsis --verbose 2>&1 | Tee-Object -FilePath tauri-build.log
          $code = $LASTEXITCODE
          "### Tauri build log (last 120 lines)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Get-Content tauri-build.log -Tail 120 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          if ($code -ne 0) {
            Write-Host "==== TAURI BUILD FAILED (exit $code) — last 80 lines ===="
            Get-Content tauri-build.log -Tail 80
          }
          exit $code

      - name: Upload Tauri build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log
          path: tauri-build.log
          retention-days: 7

      - name: Upload Windows Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ponyflow-windows
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/ponyflow.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/ponyflow.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
